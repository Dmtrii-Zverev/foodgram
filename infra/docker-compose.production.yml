volumes:
  pg_data_production:
  static_production:
  media_production:

services:

  db:
    image: postgres:16-alpine
    env_file: .env
    volumes:
      - pg_data_production:/var/lib/postgresql/data
  backend:
    container_name: foodgram-backend
    image: dmitrii23/foodgram_backend
    env_file: .env
    volumes:
      - static_production:/backend_static
      - media_production:/app/media
    depends_on:
      - db
  frontend:
    container_name: foodgram-front
    image: dmitrii23/foodgram_frontend
    volumes:
      - static_production:/app/result_build
  nginx:
    container_name: foodgram-proxy
    image: nginx:1.25.4-alpine
    ports:
      - "8080:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
      - static_production:/static
      - media_production:/media
      - ./docs/:/usr/share/nginx/html/api/docs/
    depends_on:
      - db
      - backend